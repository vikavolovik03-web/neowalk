{% extends 'base.html' %}
{% block title %}Управление товарами{% endblock %}

{% block content %}
<div class="container" style="padding-top: 50px;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h1>Все товары</h1>
        <a href="{{ url_for('admin_add_product') }}" class="btn-primary" style="background: #2ecc71; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px;">+ Добавить товар</a>
    </div>

    <table border="1" style="width: 100%; border-collapse: collapse; text-align: left;">
        <thead>
            <tr style="background: #f8f8f8;">
                <th style="padding: 10px;">ID</th>
                <th style="padding: 10px;">Фото</th>
                <th style="padding: 10px;">Название</th>
                <th style="padding: 10px;">Цена</th>
                <th style="padding: 10px;">Действия</th>
            </tr>
        </thead>
        <tbody>
            {% for product in products %}
            <tr>
                <td style="padding: 10px;">{{ product.id }}</td>
                <td style="padding: 10px;"><img src="{{ url_for('static', filename=product.image) }}" style="height: 50px;"></td>
                <td style="padding: 10px;">{{ product.name }}</td>
                <td style="padding: 10px;">{{ product.price }} руб.</td>
                <td style="padding: 10px;">
                    <a href="{{ url_for('admin_delete_product', id=product.id) }}" 
                       onclick="return confirm('Удалить товар?')" 
                       style="color: red;">Удалить</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
