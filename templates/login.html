{% extends 'base.html' %}
{% block title %}Вход - NeoWalk{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-form-wrapper">
        <h2 class="auth-title">Вход в профиль</h2>
        <p class="auth-subtitle">Введите свои данные для входа</p>
        
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label>Email или Логин</label>
                <input type="text" name="email" placeholder="example@mail.com" required>
            </div>
            
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn-auth-submit">Войти</button>
        </form>
        
        <div class="auth-divider">или</div>
        
        <a href="{{ url_for('register') }}" class="btn-auth-outline">Зарегистрироваться</a>
    </div>
</div>
{% endblock %}
